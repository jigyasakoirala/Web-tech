<!-- Forms -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Let's learn it</title>
</head>

<body>
    <h1>Form to apply for Web Tech course</h1>
    <form action="post">
        <div> <!-- div is block elenent -->
            <label for="username">Enter your Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autofocus> <!-- Text Input garem ra and "autofocus" means the cursor will automatically appear in the username field when the form opens. -->
        </div>

        <div>
            <!-- Radio Buttons-->
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>

        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>

        <div>
        <label for="comment">Enter your comment</label>
        <br>
        <textarea id="comment" name="comment" rows="4" cols="50"></textarea>
        </div>

        <!--- Select tag -->
        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="orange">Orange</option>
            </select>
        </div>
    </form>
</body>

</html>
